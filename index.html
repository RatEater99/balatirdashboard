<!DOCTYPE html>
<html>
<head>
    {%metas%}
    <title>SENTINEL // Fragile States Index</title>
    {%favicon%}
    {%css%}
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;700&family=Barlow+Condensed:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:         #060709;
            --bg1:        #0b0d11;
            --bg2:        #0f1117;
            --bg3:        #151820;
            --border:     #1c2030;
            --border2:    #252a3a;
            --text-dim:   #4a5270;   /* was #2e3550 */
            --text-mid:   #7a86a0;   /* was #5a6480 */
            --text:       #c8d4e8;   /* was #a8b4cc */
            --text-bright:#f0f4fc;   /* was #e2e8f4 */
            --red:        #e63946;
            --red-dim:    rgba(230,57,70,0.08);
            --red-glow:   rgba(230,57,70,0.25);
            --amber:      #f4a261;
            --green:      #2ec4b6;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body { background: var(--bg); font-family: "IBM Plex Mono", monospace; color: var(--text); }
        .app-shell { display: grid; grid-template-columns: 200px 1fr; height: 100vh; overflow: hidden; }
        .sidebar { background: var(--bg1); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .sidebar::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--red), transparent); }
        .sidebar-top { padding: 20px 16px 16px; border-bottom: 1px solid var(--border); }
        .system-tag { font-size: 8px; letter-spacing: 3px; color: var(--red); text-transform: uppercase; margin-bottom: 6px; }
        .logo { font-family: "Barlow Condensed", sans-serif; font-weight: 900; font-size: 20px; color: var(--text-bright); letter-spacing: 3px; text-transform: uppercase; line-height: 1; margin-bottom: 4px; }
        .logo-sub { font-size: 8px; letter-spacing: 1px; color: var(--text-dim); text-transform: uppercase; }
        .threat-block { padding: 14px 16px; border-bottom: 1px solid var(--border); }
        .threat-label { font-size: 8px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; }
        .threat-bar-wrap { height: 2px; background: var(--bg3); margin-bottom: 8px; overflow: hidden; }
        .threat-bar { height: 100%; width: 73%; background: linear-gradient(90deg, var(--amber), var(--red)); animation: pulse-bar 3s ease-in-out infinite; }
        @keyframes pulse-bar { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .threat-value { font-family: "Barlow Condensed", sans-serif; font-weight: 700; font-size: 32px; color: var(--amber); line-height: 1; }
        .threat-value span { font-size: 13px; color: var(--text-dim); font-weight: 400; }
        .nav-section { padding: 12px 16px 6px; flex: 1; overflow-y: auto; }
        .nav-heading { font-size: 8px; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; padding-left: 10px; margin-bottom: 6px; }
        .side-btn { display: flex; align-items: center; gap: 8px; width: 100%; background: transparent; border: none; border-left: 2px solid transparent; color: var(--text-mid); font-family: "IBM Plex Mono", monospace; font-size: 9px; letter-spacing: 0.5px; padding: 9px 10px; text-align: left; cursor: pointer; transition: all 0.12s; text-transform: uppercase; }
        .side-btn::before { content: "›"; font-size: 13px; color: var(--text-dim); transition: color 0.12s; line-height: 1; flex-shrink: 0; }
        .side-btn:hover { background: var(--bg3); color: var(--text-bright); border-left-color: var(--border2); }
        .side-btn:hover::before { color: var(--text-mid); }
        .side-btn.active { background: var(--red-dim); color: var(--red); border-left-color: var(--red); }
        .side-btn.active::before { color: var(--red); }
        .sidebar-footer { margin-top: auto; padding: 12px 16px; border-top: 1px solid var(--border); }
        .status-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .status-item { display: flex; align-items: center; gap: 5px; font-size: 8px; letter-spacing: 1px; color: var(--text-dim); text-transform: uppercase; }
        .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
        .dot-green { background: var(--green); animation: blink 2s infinite; }
        .dot-red { background: var(--red); animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }
        .build-tag { font-size: 7px; letter-spacing: 1px; color: var(--text-dim); opacity: 0.4; }
        .main { display: grid; grid-template-rows: 52px 1fr; overflow: hidden; }
        .topbar { display: flex; align-items: stretch; border-bottom: 1px solid var(--border); background: var(--bg1); }
        .topbar-section { display: flex; flex-direction: column; justify-content: center; padding: 0 20px; border-right: 1px solid var(--border); }
        .tl { font-size: 8px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 2px; }
        .tv { font-family: "Barlow Condensed", sans-serif; font-weight: 600; font-size: 15px; color: var(--text-bright); letter-spacing: 0.5px; white-space: nowrap; }
        .tv-red { color: var(--red); }
        .tv-green { color: var(--green); }
        .tv-amber { color: var(--amber); }
        .content-row { display: grid; grid-template-columns: 1fr 300px; overflow: hidden; }
        .map-wrap { overflow: hidden; position: relative; }
        .map-wrap::before, .map-wrap::after { content: ""; position: absolute; width: 16px; height: 16px; z-index: 10; pointer-events: none; }
        .map-wrap::before { top: 10px; left: 10px; border-top: 1px solid var(--red); border-left: 1px solid var(--red); }
        .map-wrap::after { bottom: 10px; right: 10px; border-bottom: 1px solid var(--red); border-right: 1px solid var(--red); }
        .war-panel { border-left: 1px solid var(--border); background: var(--bg1); display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--bg2); flex-shrink: 0; }
        .panel-title { font-family: "Barlow Condensed", sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 3px; color: var(--red); text-transform: uppercase; }
        .panel-badge { font-size: 7px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; padding: 2px 6px; border: 1px solid var(--border); }
        .combatants { display: grid; grid-template-columns: 1fr 28px 1fr; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .combatant-slot { padding: 12px; cursor: pointer; transition: background 0.12s; }
        .combatant-slot:hover { background: var(--bg3); }
        .combatant-slot.selecting { background: var(--red-dim); box-shadow: inset 0 -2px 0 var(--red); }
        .slot-label { font-size: 7px; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
        .slot-country { font-family: "Barlow Condensed", sans-serif; font-weight: 700; font-size: 13px; color: var(--text-bright); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .slot-empty { font-size: 9px; color: var(--text-dim); font-style: italic; }
        .vs-divider { display: flex; align-items: center; justify-content: center; font-family: "Barlow Condensed", sans-serif; font-weight: 900; font-size: 10px; color: var(--red); border-left: 1px solid var(--border); border-right: 1px solid var(--border); letter-spacing: 1px; }
        .selecting-hint { font-size: 8px; letter-spacing: 2px; color: var(--red); text-transform: uppercase; padding: 7px 14px; background: var(--red-dim); border-bottom: 1px solid rgba(230,57,70,0.2); text-align: center; animation: blink 1s infinite; flex-shrink: 0; }
        .analyze-btn { margin: 10px 12px; padding: 10px 0; background: var(--red-dim); border: 1px solid rgba(230,57,70,0.25); color: var(--red); font-family: "IBM Plex Mono", monospace; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: all 0.12s; width: calc(100% - 24px); position: relative; overflow: hidden; flex-shrink: 0; }
        .analyze-btn::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(230,57,70,0.15), transparent); transform: translateX(-100%); transition: transform 0.5s; }
        .analyze-btn:not(:disabled):hover::after { transform: translateX(100%); }
        .analyze-btn:not(:disabled):hover { background: var(--red-glow); border-color: var(--red); }
        .analyze-btn:disabled { opacity: 0.2; cursor: not-allowed; }
        .intel-output { flex: 1; overflow-y: auto; padding: 14px; font-size: 10px; line-height: 1.9; color: var(--text); white-space: pre-wrap; }
        .intel-output::-webkit-scrollbar { width: 3px; }
        .intel-output::-webkit-scrollbar-track { background: transparent; }
        .intel-output::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
        .intel-placeholder { font-size: 9px; color: var(--text-dim); line-height: 2.2; font-style: italic; }
        .chat-bar { border-top: 1px solid var(--border); display: flex; align-items: center; padding: 8px 10px; gap: 6px; background: var(--bg2); flex-shrink: 0; }
        .chat-prompt { font-size: 11px; color: var(--red); letter-spacing: 1px; white-space: nowrap; opacity: 0.7; }
        .chat-input { flex: 1; background: transparent; border: none; color: var(--text-bright); font-family: "IBM Plex Mono", monospace; font-size: 10px; outline: none; caret-color: var(--red); }
        .chat-input::placeholder { color: var(--text-dim); }
        .chat-send { background: transparent; border: 1px solid var(--border); color: var(--text-mid); font-family: "IBM Plex Mono", monospace; font-size: 9px; letter-spacing: 1px; padding: 5px 10px; cursor: pointer; transition: all 0.12s; text-transform: uppercase; }
        .chat-send:hover { border-color: rgba(230,57,70,0.4); color: var(--red); }
        .Select-control { background-color: var(--bg2) !important; border: 1px solid var(--border) !important; border-radius: 0 !important; font-family: "IBM Plex Mono", monospace !important; font-size: 9px !important; cursor: pointer !important; }
        .Select-value-label { color: var(--text-bright) !important; font-size: 9px !important; }
        .Select-arrow { border-top-color: var(--text-dim) !important; }
        .is-open .Select-arrow { border-bottom-color: var(--red) !important; }
        .Select-menu-outer { background-color: var(--bg2) !important; border: 1px solid var(--border2) !important; border-radius: 0 !important; font-family: "IBM Plex Mono", monospace !important; font-size: 9px !important; z-index: 999 !important; }
        .Select-option { background-color: var(--bg2) !important; color: var(--text-mid) !important; padding: 8px 12px !important; }
        .Select-option:hover, .Select-option.is-focused { background-color: var(--bg3) !important; color: var(--text-bright) !important; }
        .Select-option.is-selected { background-color: var(--red-dim) !important; color: var(--red) !important; }
        .Select-placeholder { color: var(--text-dim) !important; }
        .has-value.Select--single > .Select-control .Select-value .Select-value-label { color: var(--text-bright) !important; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar { animation: fadeUp 0.3s ease both; }
        .topbar { animation: fadeUp 0.3s ease 0.05s both; }
        .map-wrap { animation: fadeUp 0.3s ease 0.1s both; }
        .war-panel { animation: fadeUp 0.3s ease 0.15s both; }

        .loading-dots {
            font-family: "IBM Plex Mono", monospace;
            font-size: 11px;
            color: var(--red);
            letter-spacing: 4px;
            padding: 14px;
        }

        .loading-dots::after {
            content: "...";
            animation: dots 1.2s steps(4, end) infinite;
        }

        @keyframes dots {
            0%  { content: ""; }
            25% { content: "."; }
            50% { content: ".."; }
            75% { content: "..."; }
        }
    </style>
</head>
<body>
    {%app_entry%}
    <footer>
        {%config%}
        {%scripts%}
        {%renderer%}
    </footer>
</body>
</html>
